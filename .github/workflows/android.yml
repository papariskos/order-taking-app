name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'
        cache: 'gradle'

    - name: Grant Execute Permission to Gradlew
      run: chmod +x waiter-app/gradlew

    - name: Build Debug APK
      run: |
        cd waiter-app
        ./gradlew assembleDebug

    - name: Create or Update Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: latest
        name: Latest Waiter App Build
        body: |
          Αυτόματο build της εφαρμογής σερβιτόρου (Waiter App).
          Κατεβάστε το αρχείο `app-debug.apk` παρακάτω απευθείας στο κινητό σας για εγκατάσταση.
        draft: false
        prerelease: false
        files: waiter-app/app/build/outputs/apk/debug/app-debug.apk
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
